# Defaults
variables:
  SRC_DIR: '.'

include:
  - project: 'hyva-themes/base-ci'
    file: 'lint/php.yml'
    ref: main
  - project: 'hyva-themes/base-ci'
    file: 'static/phpcs.yml'
    ref: main
  - project: 'hyva-themes/base-ci'
    file: 'test/integration-csp.yml'
    ref: main
  - project: 'hyva-themes/base-ci'
    file: 'test/theme-playwright-csp.yml'
    ref: main

test:integration:
  extends: .test:integration_csp
  parallel:
    matrix:
      - MAGEVERSION: ['2.4.8-p3']

test:playwright:
  extends: .test:theme_playwright_csp
  parallel:
    matrix:
      - MAGEVERSION: ['2.4.8-p3']
